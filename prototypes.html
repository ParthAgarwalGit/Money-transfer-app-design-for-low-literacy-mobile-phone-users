const DIAGNOSTIC_EVENT = "cbc-runtime-diagnostics";
const ROOT_HOSTS = new Set(["localhost", "127.0.0.1"]);
const INITIAL_DIAGNOSTICS = {
  secureContext: window.isSecureContext || ROOT_HOSTS.has(window.location.hostname),
  sttSupported: Boolean(window.SpeechRecognition || window.webkitSpeechRecognition),
  micPermission: "unknown",
  currentLanguage: "hi",
  ttsStatus: "idle",
  lastTtsError: "none",
  lastSttError: "none",
  aiVoiceDisclosure: "OpenAI cloud TTS powers spoken prompts.",
};

window.__CBC_RUNTIME_DIAGNOSTICS = window.__CBC_RUNTIME_DIAGNOSTICS || { ...INITIAL_DIAGNOSTICS };

function updateDiagnostics(patch) {
  window.__CBC_RUNTIME_DIAGNOSTICS = {
    ...window.__CBC_RUNTIME_DIAGNOSTICS,
    ...patch,
  };
  window.dispatchEvent(new CustomEvent(DIAGNOSTIC_EVENT, { detail: window.__CBC_RUNTIME_DIAGNOSTICS }));
}

function RuntimeDiagnosticsPanel({ lang }) {
  const d = useRuntimeDiagnostics(lang);
  return (

function useRuntimeDiagnostics(currentLanguage) {
  const [diagnostics, setDiagnostics] = useState({
    ...window.__CBC_RUNTIME_DIAGNOSTICS,
    currentLanguage,
  });

  useEffect(() => {
    const handler = event => setDiagnostics(event.detail);
    window.addEventListener(DIAGNOSTIC_EVENT, handler);
    updateDiagnostics({ currentLanguage });

    if (navigator.permissions?.query) {
      navigator.permissions.query({ name: "microphone" }).then(status => {
        updateDiagnostics({ micPermission: status.state });
        status.onchange = () => updateDiagnostics({ micPermission: status.state });
      }).catch(() => {
        updateDiagnostics({ micPermission: "prompt" });
      });
    }

    return () => window.removeEventListener(DIAGNOSTIC_EVENT, handler);
  }, [currentLanguage]);

  return diagnostics;
}

async function ensureMicrophoneAccess() {
  const secureContext = window.isSecureContext || ROOT_HOSTS.has(window.location.hostname);
  if (!secureContext) {
    const message = "Microphone capture needs Chrome or Edge on localhost/HTTPS.";
    updateDiagnostics({ secureContext: false, lastSttError: message });
    return { ok: false, status: "error", message };
  }

  if (!navigator.mediaDevices?.getUserMedia) {
    const message = "Microphone capture is not available in this browser.";
    updateDiagnostics({ lastSttError: message });
    return { ok: false, status: "unsupported", message };
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(track => track.stop());
    updateDiagnostics({ micPermission: "granted", lastSttError: "none" });
    return { ok: true, status: "granted", message: "" };
  } catch (error) {
    const denied = error && (error.name === "NotAllowedError" || error.name === "PermissionDeniedError");
    const message = denied ? "Microphone permission was denied." : "Unable to start microphone capture.";
    updateDiagnostics({
      micPermission: denied ? "denied" : window.__CBC_RUNTIME_DIAGNOSTICS.micPermission,
      lastSttError: message,
    });
    return { ok: false, status: denied ? "error" : "error", message };
  }
}

const speechState = {
  token: 0,
  activeAudio: null,
};

function normalizeLangCode(langCode) {
  return (langCode || "en-IN").split("-")[0].toLowerCase();
}

async function requestTtsBlob(text, langCode, purpose = "prompt") {
  updateDiagnostics({ ttsStatus: "loading", lastTtsError: "none" });
  const response = await fetch("/api/tts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      text,
      lang: normalizeLangCode(langCode),
      purpose,
    }),
  });

  if (!response.ok) {
    let message = "TTS request failed.";
    try {
      const data = await response.json();
      message = data.message || message;
    } catch (error) {
      message = await response.text();
    }
    updateDiagnostics({ ttsStatus: "error", lastTtsError: message || "TTS request failed." });
    throw new Error(message || "TTS request failed.");
  }

  return response.blob();
}

// Google Translate TTS endpoint — plays real Hindi/Bengali/Marathi/English voices
// via <audio> tag (no CORS issue for media elements). Chunked at 200 chars.
function googleTtsUrls(text, lang) {
  const code = (lang || 'en').split('-')[0].toLowerCase();
  const chunks = [];
  const clean = String(text).replace(/\s+/g, ' ').trim();
  for (let i = 0; i < clean.length; i += 190) chunks.push(clean.slice(i, i + 190));
  return chunks.map(q =>
    `https://translate.google.com/translate_tts?ie=UTF-8&tl=${encodeURIComponent(code)}&client=tw-ob&q=${encodeURIComponent(q)}`
  );
}

function playAudioUrl(url) {
  return new Promise((resolve, reject) => {
    const audio = new Audio(url);
    speechState.activeAudio = audio;
    audio.onended = () => resolve();
    audio.onerror = () => reject(new Error('audio error'));
    audio.play().catch(reject);
  });
}

async function googleTranslateSpeak(text, langCode) {
  const urls = googleTtsUrls(text, langCode);
  updateDiagnostics({ ttsStatus: "playing", lastTtsError: "using Google Translate TTS fallback" });
  for (const url of urls) {
    await playAudioUrl(url);
  }
  updateDiagnostics({ ttsStatus: "ready" });
}

function browserSynthesisSpeak(text, langCode) {
  return new Promise(resolve => {
    if (!window.speechSynthesis) { resolve(); return; }
    try {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = langCode || 'en-IN';
      const v = pickVoice(utter.lang);
      if (v) { utter.voice = v; utter.lang = v.lang; }
      utter.rate = 0.9;
      utter.onend = () => { updateDiagnostics({ ttsStatus: "ready" }); resolve(); };
      utter.onerror = () => { updateDiagnostics({ ttsStatus: "error", lastTtsError: "Native TTS error." }); resolve(); };
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utter);
    } catch (e) { resolve(); }
  });
}

async function fallbackNativeSpeak(text, langCode) {
  // Tier 1: Google Translate TTS — has real hi/bn/mr/en voices and works from file://
  try {
    await googleTranslateSpeak(text, langCode);
    return;
  } catch (err) {
    updateDiagnostics({ lastTtsError: "Google TTS failed, trying browser synthesis." });
  }
  // Tier 2: browser speechSynthesis (may not support non-English on Windows)
  await browserSynthesisSpeak(text, langCode);
}

async function playQueuedAudio(item, token) {
  if (!item?.text || token !== speechState.token) return;
  let blob;
  try {
    blob = await requestTtsBlob(item.text, item.lang, item.purpose);
  } catch (err) {
    // Cloud TTS unavailable (no server, no API key, offline) — fall back to browser speech.
    if (token !== speechState.token) return;
    return fallbackNativeSpeak(item.text, item.lang);
  }
  if (token !== speechState.token) return;

  const audioUrl = URL.createObjectURL(blob);
  await new Promise((resolve, reject) => {
    const audio = new Audio(audioUrl);
    speechState.activeAudio = audio;
    updateDiagnostics({ ttsStatus: "playing" });
    audio.onended = () => {
      URL.revokeObjectURL(audioUrl);
      if (speechState.activeAudio === audio) speechState.activeAudio = null;
      updateDiagnostics({ ttsStatus: "ready" });
      resolve();
    };
    audio.onerror = () => {
      URL.revokeObjectURL(audioUrl);
      if (speechState.activeAudio === audio) speechState.activeAudio = null;
      updateDiagnostics({ ttsStatus: "error", lastTtsError: "Audio playback failed — falling back to browser TTS." });
      fallbackNativeSpeak(item.text, item.lang).then(resolve);
    };
    audio.play().catch(error => {
      URL.revokeObjectURL(audioUrl);
      if (speechState.activeAudio === audio) speechState.activeAudio = null;
      updateDiagnostics({ ttsStatus: "error", lastTtsError: (error.message || "Autoplay blocked") + " — falling back to browser TTS." });
      fallbackNativeSpeak(item.text, item.lang).then(resolve);
    });
  });
}

function queueSpeechItems(items) {
  const token = ++speechState.token;
  const filtered = (items || []).filter(item => item && item.text);
  return filtered.reduce(
    (promise, item) => promise.then(() => playQueuedAudio(item, token)).catch(() => {}),
    Promise.resolve(),
  );
}

function pickVoice(langCode) {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  const lc = (langCode || '').toLowerCase();
  const prefix = lc.split('-')[0];
  // 1. Exact language match (e.g. hi-IN)
  let v = voices.find(v => v.lang.toLowerCase() === lc);
  // 2. Any voice whose lang starts with the language prefix (hi, ta, bn, mr)
  if (!v) v = voices.find(v => v.lang.toLowerCase().startsWith(prefix + '-') || v.lang.toLowerCase() === prefix);
  // 3. Indian-English voice ONLY for English
  if (!v && prefix === 'en') v = voices.find(v => v.lang.toLowerCase() === 'en-in');
  // 4. Any voice whose name hints at the language
  if (!v) {
    const hintRegex = new RegExp(prefix === 'hi' ? 'india|hindi|ravi|heera|lekha|kalpana' : prefix, 'i');
    v = voices.find(v => hintRegex.test(v.name));
  }
  // If no matching voice is found, DO NOT fallback to an English voice for Hindi/Marathi/Bangla
  // Returning null allows the browser to natively use utter.lang to pick the system voice.
  return v || null;
}

function speak(text, langCode) {
  return queueSpeechItems([{ text, lang: langCode || "en-IN", purpose: "prompt" }]);
}

function stopSpeak() {
  speechState.token += 1;
  if (speechState.activeAudio) {
    try {
      speechState.activeAudio.pause();
      speechState.activeAudio.currentTime = 0;
    } catch (error) {
      // no-op
    }
    speechState.activeAudio = null;
  }
  updateDiagnostics({ ttsStatus: "idle" });
}

// --- Tiny persistence store (survives reload, degrades to in-memory) ---
// Used by C3r (transfer history) and B5 (voice diary) so longitudinal
// pattern detection isn't wiped by reloads or incognito mode.
const cbcStore = (() => {
  let storageOk = true;
  try {
    const k = '__cbc_probe__';
    window.localStorage.setItem(k, '1');
    window.localStorage.removeItem(k);
  } catch (e) {
    storageOk = false;
  }
  const mem = {};
  return {
    ok: storageOk,
    get(key, fallback) {
      try {
        if (!storageOk) return mem[key] ?? fallback;
        const raw = window.localStorage.getItem(key);
        return raw == null ? fallback : JSON.parse(raw);
      } catch (e) { return fallback; }
    },
    set(key, val) {
      try {
        if (!storageOk) { mem[key] = val; return; }
        window.localStorage.setItem(key, JSON.stringify(val));
      } catch (e) { mem[key] = val; }
    },
    push(key, item, cap = 50) {
      const arr = this.get(key, []);
      arr.push({ ...item, ts: Date.now() });
      while (arr.length > cap) arr.shift();
      this.set(key, arr);
      return arr;
    },
  };
})();

// --- Shared useVoiceCapture hook ---
// Wraps SpeechRecognition for mic-based capture with transcript
// Auto-restarts if recognition ends prematurely (e.g. mic permission dialog)
function useVoiceCapture(langCode) {
  const [status, setStatus] = React.useState('idle'); // idle | listening | heard | confirmed | unclear | error | unsupported
  const [transcript, setTranscript] = React.useState('');
  const [isFinal, setIsFinal] = React.useState(false);
  const [confidence, setConfidence] = React.useState(0);
  const recognitionRef = React.useRef(null);
  const wantListeningRef = React.useRef(false); // true = user wants mic on
  const startTimeRef = React.useRef(0);         // tracks when we started
  const restartCountRef = React.useRef(0);      // prevent infinite restart loops

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  const start = React.useCallback(() => {
    if (!SpeechRecognition) { setStatus('unsupported'); return; }
    wantListeningRef.current = true;
    restartCountRef.current = 0;
    try {
      // If there's an existing instance, stop it first
      if (recognitionRef.current) {
        try { recognitionRef.current.abort(); } catch(e) {}
      }
      const recognition = new SpeechRecognition();
      recognition.lang = langCode || 'hi-IN';
      recognition.interimResults = true;
      recognition.maxAlternatives = 5; // try multiple candidates — helps code-switching / dialects
      recognition.continuous = true;

      recognition.onstart = () => {
        startTimeRef.current = Date.now();
        setStatus('listening');
      };
      recognition.onresult = (event) => {
        // Concatenate the top alternative for display, but also collect all
        // alternatives so downstream parsers (e.g. amount extraction) can
        // try each candidate — helps when the locked STT language mis-hears
        // code-switched or regional-dialect speech.
        let fullTranscript = '';
        const allAlts = [];
        let finalResult = false;
        let bestConf = 0;
        for (let i = 0; i < event.results.length; i++) {
          const result = event.results[i];
          fullTranscript += result[0].transcript;
          for (let a = 0; a < result.length; a++) {
            allAlts.push(result[a].transcript);
            bestConf = Math.max(bestConf, result[a].confidence || 0);
          }
          if (result.isFinal) finalResult = true;
        }
        setTranscript(fullTranscript);
        window.__CBC_LAST_ALTS = allAlts;
        setIsFinal(finalResult);
        setConfidence(bestConf);
        if (finalResult) {
          setStatus(bestConf > 0.5 ? 'heard' : 'unclear');
        }
      };
      recognition.onerror = (e) => {
        const elapsed = Date.now() - startTimeRef.current;
        // Ignore no-speech errors in the first 5 seconds (grace period for mic permission)
        if (e.error === 'no-speech' && elapsed < 5000 && wantListeningRef.current) {
          // Don't set error status — onend will auto-restart
          return;
        }
        if (e.error === 'aborted') return; // we aborted it ourselves
        if (e.error === 'no-speech') setStatus('unclear');
        else if (e.error === 'not-allowed') setStatus('error');
        else setStatus('error');
      };
      recognition.onend = () => {
        // Auto-restart if user still wants to listen
        if (wantListeningRef.current && restartCountRef.current < 10) {
          restartCountRef.current++;
          setTimeout(() => {
            if (wantListeningRef.current) {
              try { recognition.start(); } catch(e) {
                setStatus('error');
              }
            }
          }, 300);
        } else if (wantListeningRef.current) {
          // Exhausted restart budget — surface error instead of silently going idle
          wantListeningRef.current = false;
          setStatus('error');
        }
      };
      recognitionRef.current = recognition;
      setTranscript('');
      setIsFinal(false);
      setConfidence(0);
      recognition.start();
    } catch (e) {
      setStatus('error');
    }
  }, [langCode, SpeechRecognition]);

  const stop = React.useCallback(() => {
    wantListeningRef.current = false;
    if (recognitionRef.current) {
      try { recognitionRef.current.stop(); } catch(e) {}
    }
  }, []);

  const reset = React.useCallback(() => {
    wantListeningRef.current = false;
    if (recognitionRef.current) {
      try { recognitionRef.current.abort(); } catch(e) {}
    }
    setStatus('idle');
    setTranscript('');
    setIsFinal(false);
    setConfidence(0);
  }, []);

  return { status, transcript, isFinal, confidence, start, stop, reset };
}

// --- speakInstructions helper ---
// Reads the same COPY entry in all 4 languages (hi, bn, mr + English fallback)
// protoKey = 'B2' | 'B5' | 'C2' etc., copyKey = 'prompt' | 'menu' etc.
function speakInstructions(protoKey, copyKey) {
  const proto = COPY[protoKey];
  if (!proto) return;
  // Build translations from all available languages
  const translations = {};
  // English first — use 'hi' text as English isn't always in COPY, but speak in English voice
  // Actually let's just use whatever languages are available in COPY
  const langMap = { hi: 'hi', ta: 'ta', bn: 'bn', mr: 'mr' };
  // Map COPY lang keys to REPEATED_SPEECH_LANGS codes
  const copyToSpeech = { hi: 'hi', ta: 'ta', bn: 'bn', mr: 'mr' };
  for (const [copyLang, speechCode] of Object.entries(copyToSpeech)) {
    if (proto[copyLang] && proto[copyLang][copyKey]) {
      translations[speechCode] = proto[copyLang][copyKey];
    }
  }
  if (Object.keys(translations).length > 0) {
    buildRepeatedSpeech(translations);
  }
}

// --- Extract number from spoken transcript ---
// Convert Devanagari / Bengali / Tamil / Gujarati digits to ASCII
function normalizeDigitsToAscii(text) {
  if (!text) return '';
  const map = {
    // Devanagari 0-9
    '०':'0','१':'1','२':'2','३':'3','४':'4','५':'5','६':'6','७':'7','८':'8','९':'9',
    // Bengali 0-9
    '০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9',
    // Tamil 0-9
    '௦':'0','௧':'1','௨':'2','௩':'3','௪':'4','௫':'5','௬':'6','௭':'7','௮':'8','௯':'9',
    // Gujarati 0-9
    '૦':'0','૧':'1','૨':'2','૩':'3','૪':'4','૫':'5','૬':'6','૭':'7','૮':'8','૯':'9',
  };
  return String(text).replace(/[०-९০-৯௦-௯૦-૯]/g, ch => map[ch] || ch);
}

function extractAmountFromTranscript(text) {
  // Accept either a single string or an array of STT alternatives.
  const candidates = Array.isArray(text) ? text : [text];
  // Also pull in the most recent multi-alternative buffer from the STT hook.
  if (window.__CBC_LAST_ALTS && Array.isArray(window.__CBC_LAST_ALTS)) {
    candidates.push(...window.__CBC_LAST_ALTS);
  }

  for (const raw of candidates) {
    const result = extractOne(raw);
    if (result != null) return result;
  }
  return null;

  function extractOne(t) {
  if (!t) return null;
  t = normalizeDigitsToAscii(t);
  // Try to find digits first
  const digitMatch = t.match(/\d+/);
  if (digitMatch) return parseInt(digitMatch[0], 10);
  // Hindi/Marathi/Bengali number words
  const wordMap = {
    // Hindi
    'सौ': 100, 'दो सौ': 200, 'तीन सौ': 300, 'चार सौ': 400, 'पाँच सौ': 500,
    'छह सौ': 600, 'सात सौ': 700, 'आठ सौ': 800, 'नौ सौ': 900, 'हज़ार': 1000,
    'एक हज़ार': 1000, 'दो हज़ार': 2000, 'पाँच हज़ार': 5000,
    // English
    'hundred': 100, 'two hundred': 200, 'three hundred': 300, 'four hundred': 400,
    'five hundred': 500, 'six hundred': 600, 'seven hundred': 700, 'eight hundred': 800,
    'nine hundred': 900, 'thousand': 1000, 'one thousand': 1000, 'two thousand': 2000,
    'five thousand': 5000,
    // Bangla
    'একশো': 100, 'দুইশো': 200, 'তিনশো': 300, 'চারশো': 400, 'পাঁচশো': 500,
    'আটশো': 800, 'হাজার': 1000, 'এক হাজার': 1000,
    // Marathi
    'शंभर': 100, 'दोनशे': 200, 'तीनशे': 300, 'चारशे': 400, 'पाचशे': 500,
    'आठशे': 800, 'हजार': 1000,
    // Tamil
    'நூறு': 100, 'இருநூறு': 200, 'முந்நூறு': 300, 'நானூறு': 400, 'ஐநூறு': 500,
    'அறுநூறு': 600, 'எழுநூறு': 700, 'எண்ணூறு': 800, 'தொள்ளாயிரம்': 900, 'ஆயிரம்': 1000,
    // Gujarati
    'સો': 100, 'બસો': 200, 'ત્રણસો': 300, 'ચારસો': 400, 'પાંચસો': 500,
    'આઠસો': 800, 'હજાર': 1000,
  };
  const lower = t.toLowerCase();
  for (const [word, val] of Object.entries(wordMap)) {
    if (lower.includes(word.toLowerCase()) || t.includes(word)) return val;
  }
  return null;
  }
}

function C2({ lang }) {
  const [step, setStep] = useState(0);
  const [amount, setAmount] = useState('');
  const [pin, setPin] = useState('');
  const [undoWindow, setUndoWindow] = useState(0);
  const [voiceAmountMode, setVoiceAmountMode] = useState(false); // Speak another amount
  const [spokenAmount, setSpokenAmount] = useState(null);        // parsed from transcript
  const [confirmCountdown, setConfirmCountdown] = useState(0);   // Auto-close in {n}
  const [cancelled, setCancelled] = useState(false);
  const voice = useVoiceCapture(LANGS[lang].ttsCode);
  const steps = ["Call", "Menu", "Who", "Amount", "Confirm", "PIN", "Done"];
  const c = COPY.C2[lang];

  // Common fallback amounts when speech decoding fails
  const FALLBACK_AMOUNTS = [200, 500, 1000, 1500, 2000];

  useEffect(() => {
    if (step === 1) speak(c.menu, LANGS[lang].ttsCode);
    if (step === 2) speak(c.who, LANGS[lang].ttsCode);
    if (step === 3) speak(c.amount, LANGS[lang].ttsCode);
    if (step === 4) {
      const dyn = buildC2SpeechCopy(amount || '800');
      speak(dyn.confirm[lang] || c.confirm.replace(/AMOUNT/g, String(amount || '800')), LANGS[lang].ttsCode);
      setTimeout(() => buildRepeatedSpeech(STEP_CONFIRMATIONS.C2_amount_set), 3000);
    }
    if (step === 5) speak(c.pin, LANGS[lang].ttsCode);
    if (step === 6) {
      const dyn = buildC2SpeechCopy(amount || '800');
      speak(dyn.done[lang] || c.done.replace(/AMOUNT/g, String(amount || '800')), LANGS[lang].ttsCode);
      setTimeout(() => buildRepeatedSpeech(STEP_CONFIRMATIONS.C2_sent), 4000);
    }
    return () => stopSpeak();
  }, [step, lang]);

  // Undo window countdown on done step
  useEffect(() => {
    if (step !== 6) return;
    setUndoWindow(120);
    const iv = setInterval(() => setUndoWindow(t => t > 0 ? t - 1 : 0), 1000);
    return () => clearInterval(iv);
  }, [step]);

  // Auto-close in {confirmCountdown}s on confirm step
  useEffect(() => {
    if (step !== 4) { setConfirmCountdown(0); return; }
    setConfirmCountdown(30);
    const iv = setInterval(() => setConfirmCountdown(t => {
      if (t <= 1) {
        clearInterval(iv);
        // Auto-cancel on timeout → play cancelled audio
        setCancelled(true);
        const dyn = buildC2SpeechCopy(amount || '800');
        speak(dyn.cancelled[lang] || "Cancelled.", LANGS[lang].ttsCode);
        setStep(0); setAmount(''); setPin(''); setVoiceAmountMode(false); voice.reset();
        return 0;
      }
      return t - 1;

    if (step !== 3) return;

        setResultType('cancelled');
        speak(c.skipped, LANGS[lang].ttsCode);

          <HapticBubble text={step === 3 ? "Slow urgent pulse every 5s" : step === 4 ? "Heartbeat = sent, or single long = cancelled" : step === 2 ? "3 confirming buzzes" : "Silent"} active={step === 3 || step === 4 || step === 2} />

          <div className="bg-blue-50 border border-blue-200 p-3 rounded-xl text-xs text-blue-900">
            <strong>🛡️ Safety:</strong> Inaction = cancellation. NEVER auto-sends without explicit weekly tap. After 4 weeks of no approvals, auto-disables. 5 rapid shakes anytime = turn off forever.
          </div>
        </div>
      </div>
    </div>
  );
}
